{{- if .Values.streamlit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-ui
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: streamlit-ui
    app.kubernetes.io/component: frontend
    {{- include "idp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.streamlit.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: streamlit-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: streamlit-ui
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: idp-streamlit
      terminationGracePeriodSeconds: 30
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: streamlit
          image: {{ include "idp.image" (dict "image" .Values.images.streamlit "global" .Values.global) }}
          imagePullPolicy: {{ .Values.images.streamlit.pullPolicy }}
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
          envFrom:
            - configMapRef:
                name: idp-platform-config
            - secretRef:
                name: idp-platform-secrets
          resources:
            {{- toYaml .Values.streamlit.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: streamlit-ui
{{- end }}
