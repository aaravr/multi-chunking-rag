{{- if .Values.ingestion.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: ingestion-worker
    app.kubernetes.io/component: worker
    {{- include "idp.labels" . | nindent 4 }}
spec:
  # Replicas managed by KEDA — intentionally omitted
  selector:
    matchLabels:
      app.kubernetes.io/name: ingestion-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingestion-worker
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: idp-ingestion
      terminationGracePeriodSeconds: 120
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "idp.image" (dict "image" .Values.images.ingestion "global" .Values.global) }}
          imagePullPolicy: {{ .Values.images.ingestion.pullPolicy }}
          envFrom:
            - configMapRef:
                name: idp-platform-config
            - secretRef:
                name: idp-platform-secrets
          resources:
            {{- toYaml .Values.ingestion.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["python", "/app/healthcheck.py"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: model-cache
              mountPath: /app/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: model-cache
          emptyDir:
            sizeLimit: 2Gi
{{- end }}
