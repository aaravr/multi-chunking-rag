{{/*
Generates a Deployment + KEDA ScaledObject for each enabled agent.
*/}}
{{- range $name, $agent := .Values.agents }}
{{- if $agent.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-{{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "idp.agentLabels" (dict "agentName" $name "root" $) | nindent 4 }}
spec:
  # Replicas managed by KEDA — intentionally omitted
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-{{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-{{ $name }}
        app.kubernetes.io/component: agent
        idp/agent-type: {{ $name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: idp-agent
      terminationGracePeriodSeconds: 60
      securityContext:
        {{- toYaml $.Values.securityContext | nindent 8 }}
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: {{ include "idp.image" (dict "image" $.Values.images.agent "global" $.Values.global) }}
          imagePullPolicy: {{ $.Values.images.agent.pullPolicy }}
          args: ["--agent", "{{ $name }}"]
          envFrom:
            - configMapRef:
                name: idp-platform-config
            - secretRef:
                name: idp-platform-secrets
          resources:
            {{- toYaml $agent.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["python", "/app/healthcheck.py"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python", "/app/healthcheck.py"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            exec:
              command: ["python", "/app/healthcheck.py"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if $.Values.kafka.tls.enabled }}
            - name: kafka-tls
              mountPath: /etc/kafka/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 200Mi
        {{- if $.Values.kafka.tls.enabled }}
        - name: kafka-tls
          secret:
            secretName: {{ $.Values.kafka.tls.secretName }}
            optional: true
        {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: agent-{{ $name }}
{{- end }}
{{- end }}
