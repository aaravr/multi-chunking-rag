# ============================================================
# Secrets — TEMPLATE ONLY. Do NOT commit real values.
# Use sealed-secrets, external-secrets-operator, or Vault CSI
# in production to inject these at deploy time.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: idp-platform-secrets
  namespace: idp-platform
  labels:
    app.kubernetes.io/part-of: idp-platform
  annotations:
    # Rotate secrets on change — triggers rolling restart
    secret.reloader.stakater.com/reload: "true"
type: Opaque
stringData:
  # PostgreSQL
  DATABASE_URL: "postgresql://idp_user:CHANGE_ME@postgres.idp-platform.svc.cluster.local:5432/idp_db"

  # OpenAI
  OPENAI_API_KEY: "CHANGE_ME"

  # Azure OpenAI (if LLM_PROVIDER=azure_openai)
  AZURE_OPENAI_ENDPOINT: ""
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_DEPLOYMENT_ID: ""

  # Azure Document Intelligence
  AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ""
  AZURE_DOCUMENT_INTELLIGENCE_KEY: ""

  # Kafka SASL credentials
  KAFKA_SASL_USERNAME: "CHANGE_ME"
  KAFKA_SASL_PASSWORD: "CHANGE_ME"

  # Neo4j (if ENABLE_NEO4J=true)
  NEO4J_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-tls-certs
  namespace: idp-platform
  labels:
    app.kubernetes.io/part-of: idp-platform
type: kubernetes.io/tls
data:
  # Base64-encoded PEM certificates — inject via CI/CD or external-secrets
  tls.crt: ""
  tls.key: ""
  ca.crt: ""
