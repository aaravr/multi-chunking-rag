# ── Streamlit UI ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-ui
  namespace: idp-platform
  labels: &streamlit-labels
    app.kubernetes.io/name: streamlit-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: idp-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: streamlit-ui
  template:
    metadata:
      labels:
        <<: *streamlit-labels
    spec:
      serviceAccountName: idp-streamlit
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: streamlit
          image: idp-platform/streamlit:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
          envFrom:
            - configMapRef:
                name: idp-platform-config
            - secretRef:
                name: idp-platform-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: streamlit-ui
---
# ── Ingestion Worker ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-worker
  namespace: idp-platform
  labels: &ingestion-labels
    app.kubernetes.io/name: ingestion-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: idp-platform
spec:
  # replicas managed by KEDA — omitted intentionally
  selector:
    matchLabels:
      app.kubernetes.io/name: ingestion-worker
  template:
    metadata:
      labels:
        <<: *ingestion-labels
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: idp-ingestion
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: idp-platform/ingestion:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: idp-platform-config
            - secretRef:
                name: idp-platform-secrets
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
          livenessProbe:
            exec:
              command: ["python", "/app/healthcheck.py"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: model-cache
              mountPath: /app/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: model-cache
          emptyDir:
            sizeLimit: 2Gi
