# ============================================================
# Agent Deployments — one per agent type
# KEDA ScaledObjects manage replica counts; do NOT set replicas here.
# ============================================================

# ── Router Agent ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-router
  namespace: idp-platform
  labels: &router-labels
    app.kubernetes.io/name: agent-router
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: idp-platform
    idp/agent-type: router
spec:
  # replicas managed by KEDA — omitted intentionally
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-router
  template:
    metadata:
      labels:
        <<: *router-labels
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: idp-agent
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: idp-platform/agent:latest
          imagePullPolicy: Always
          args: ["--agent", "router"]
          envFrom:
            - configMapRef:
                name: idp-platform-config
            - secretRef:
                name: idp-platform-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["python", "/app/healthcheck.py"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python", "/app/healthcheck.py"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            exec:
              command: ["python", "/app/healthcheck.py"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: kafka-tls
              mountPath: /etc/kafka/tls
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: kafka-tls
          secret:
            secretName: kafka-tls-certs
            optional: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: agent-router
---
